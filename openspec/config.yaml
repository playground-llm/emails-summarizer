schema: spec-driven

context: |
  Project: emails-summarizer
  Domain: Email client application — users browse a list of emails in a sidebar and view full details in a detail panel.

  Build system: Gradle 8.13 monorepo (always use ./gradlew, never bare gradle).
  Group: com.emails-summarizer | Version: 0.1.0
  Subprojects:
    - ui  — Frontend. Tech stack: Vue 3 (CDN, no bundler yet). Entry point: ui/index.html.
            Two-panel layout: category list sidebar (left, from api-rs GET /categories) + message list panel (right, from api-rs GET /messages?categoryCode=).
            Authentication: OAuth2 Authorization Code flow via GitHub; token stored in sessionStorage.
            Page must be served over HTTP (not file://); OAuth2 redirect requires a registered redirect_uri.
    - api-rs — Backend API. Tech stack: Java 21, Spring Boot 4, Spring Data JPA, Spring Security, OAuth2 Resource Server.
            Storage: H2 in-memory database (dev only); schema initialised from schema.sql.
            OAuth2: GitHub OAuth App as identity provider; Authorization Code flow only.
            api-rs is an OAuth2 Resource Server; validates GitHub opaque tokens via https://api.github.com/user.
            GitHub client ID/secret injected via env vars GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET.
            User model: authenticated GitHub users are auto-registered in USERS table on first login; roles stored
            in ROLES table. Default role on registration is ROLE_READ. Additional roles (ROLE_EDIT, ROLE_DEL) are
            granted via direct DB access until a role-management API is built.
            Three roles:
              ROLE_READ  — GET /categories, GET /messages
              ROLE_EDIT  — POST and PUT on /categories and /messages
              ROLE_DEL   — DELETE on /categories and /messages
            Data model:
              USERS (login PK, github_id, name, avatar_url)
              ROLES (id PK, login FK→USERS, role, UNIQUE(login,role))
              CATEGORY (id PK, name, code UNIQUE, description)
              MESSAGE (id UUID PK, title, body, category_code FK→CATEGORY)

  Repository: git@github.com:playground-llm/emails-summarizer.git

rules:
  proposal:
    - Keep proposals concise (1-2 pages maximum).
    - Always include a "Non-Goals" section so scope is explicit.
    - List every new capability with a kebab-case identifier — these map 1-to-1 to spec files.
  design:
    - Focus on architectural decisions and rationale (why X over Y), not line-by-line implementation.
    - Call out CDN vs. bundler trade-offs explicitly for any frontend work until a build pipeline is established.
  specs:
    - Use SHALL/MUST for normative requirements; avoid "should" or "may".
    - Every requirement MUST have at least one testable scenario in Given/When/Then format.
    - Scenarios MUST use exactly 4 hashtags (####).
  tasks:
    - Tasks should be completable in a single session (~1-2 hours each).
    - Order tasks by dependency (setup before implementation, implementation before verification).
    - The last task group should always be a "Verification" section with browser/manual checks.
