spring:
  application:
    name: api-rs

  datasource:
    url: jdbc:h2:mem:emailsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    oauth2:
      resourceserver:
        opaquetoken:
          # GitHub OAuth App credentials — set via environment variables
          client-id: ${GITHUB_CLIENT_ID:change-me}
          client-secret: ${GITHUB_CLIENT_SECRET:change-me}

server:
  port: 8080
